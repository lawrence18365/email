name: Nightly Email Pre-Verification

on:
  schedule:
    # Run at 11pm PT (07:00 UTC) — after sending hours, before next day
    - cron: '0 7 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  preverify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pre-verify tomorrow's send queue
        env:
          DATABASE_URI: ${{ secrets.DATABASE_URI }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          VERIFALIA_USERNAME: ${{ secrets.VERIFALIA_USERNAME }}
          VERIFALIA_PASSWORD: ${{ secrets.VERIFALIA_PASSWORD }}
        run: python preverify_emails.py

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              -d parse_mode="HTML" \
              -d text="<b>Pre-Verification Cron Failed</b>%0ACheck GitHub Actions for details."
          fi
